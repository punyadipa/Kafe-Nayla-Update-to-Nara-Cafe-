<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil - Nara Café</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  min-height:100vh;
  background:
    linear-gradient(160deg, rgba(200,102,122,.1) 0%, rgba(155,137,196,.08) 100%),
    #FDF6F0;
  display:flex;align-items:center;justify-content:center;padding:40px 16px;
}

.profile-wrap{
  width:100%;max-width:460px;
}

/* Header card */
.profile-header{
  background:linear-gradient(135deg,#C8667A 0%,#8B5E52 100%);
  border-radius:24px 24px 0 0;
  padding:36px 32px 50px;
  text-align:center;color:white;
  position:relative;
}
.profile-brand{font-family:'Playfair Display',serif;font-size:18px;opacity:.85;margin-bottom:20px;}
.avatar{
  width:80px;height:80px;border-radius:50%;
  background:rgba(255,255,255,.25);
  border:3px solid rgba(255,255,255,.5);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:30px;color:white;
  margin:0 auto 14px;
}
.profile-header h2{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:4px;}
.role-badge{
  display:inline-block;
  background:rgba(255,255,255,.2);
  border:1px solid rgba(255,255,255,.35);
  font-size:11px;font-weight:500;letter-spacing:.08em;
  padding:4px 14px;border-radius:20px;
  margin-top:6px;text-transform:uppercase;
}

/* Body card */
.profile-body{
  background:white;
  border-radius:0 0 24px 24px;
  padding:16px 32px 32px;
  box-shadow:0 16px 40px rgba(45,27,30,.1);
  position:relative;
  margin-top:-20px;
}

.data-row{
  display:flex;align-items:center;gap:14px;
  padding:16px 0;border-bottom:1px solid #F5EAEC;
}
.data-row:last-of-type{border-bottom:none;}
.data-icon{
  width:36px;height:36px;border-radius:10px;
  background:#FEF0F5;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.data-label{font-size:11px;color:#8B7275;font-weight:500;letter-spacing:.03em;margin-bottom:2px;}
.data-value{font-size:14px;color:#2D1B1E;font-weight:500;}

.btn-logout{
  width:100%;padding:13px;
  margin-top:24px;
  border:none;border-radius:12px;
  background:#C8667A;color:white;
  font-size:15px;font-weight:600;cursor:pointer;
  transition:.3s;font-family:'Poppins',sans-serif;
}
.btn-logout:hover{background:#B5566A;box-shadow:0 8px 20px rgba(200,102,122,.3);}

.back-link{
  display:block;text-align:center;
  margin-top:16px;font-size:12px;
  color:#8B7275;text-decoration:none;
}
.back-link:hover{color:#C8667A;}
</style>
</head>
<body>

<div class="profile-wrap">

  <div class="profile-header">
    <div class="profile-brand">☕ Nara Café ☕</div>
    <div class="avatar" id="avatarInitial">?</div>
    <h2 id="namaHeader">—</h2>
    <div class="role-badge" id="roleHeader">—</div>
  </div>

  <div class="profile-body">

    <div class="data-row">
      <div class="data-icon">👤</div>
      <div>
        <div class="data-label">Nama Lengkap</div>
        <div class="data-value" id="nama">—</div>
      </div>
    </div>

    <div class="data-row">
      <div class="data-icon">📧</div>
      <div>
        <div class="data-label">Email</div>
        <div class="data-value" id="email">—</div>
      </div>
    </div>

    <div class="data-row">
      <div class="data-icon">📞</div>
      <div>
        <div class="data-label">No. Telepon</div>
        <div class="data-value" id="telepon">—</div>
      </div>
    </div>

    <div class="data-row">
      <div class="data-icon">🏷️</div>
      <div>
        <div class="data-label">Role Akun</div>
        <div class="data-value" id="role">—</div>
      </div>
    </div>

    <button class="btn-logout" onclick="logout()">Keluar dari Akun</button>
    <a href="index.html" class="back-link">← Kembali ke Beranda</a>

  </div>

</div>

<script>
const isLogin = sessionStorage.getItem("isLogin");
const userLogin = sessionStorage.getItem("userLogin");

if(isLogin !== "true" || userLogin === null){
  alert("Silakan login terlebih dahulu.");
  window.location.href = "login.html";
} else {
  const user = JSON.parse(userLogin);
  document.getElementById("nama").innerText = user.nama;
  document.getElementById("email").innerText = user.email;
  document.getElementById("telepon").innerText = user.telepon;
  document.getElementById("role").innerText = user.role;
  document.getElementById("namaHeader").innerText = user.nama;
  document.getElementById("roleHeader").innerText = user.role;
  document.getElementById("avatarInitial").innerText = user.nama.charAt(0).toUpperCase();
}

function logout(){
  sessionStorage.removeItem("isLogin");
  sessionStorage.removeItem("userLogin");

  localStorage.removeItem("isLogin");
  localStorage.removeItem("userLogin");

  alert("Sampai jumpa! Logout berhasil.");
  window.location.href = "login.html";
}
</script>
</body>
</html>
